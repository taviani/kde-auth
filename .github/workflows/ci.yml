name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -mod=readonly ./...

      - name: Test
        run: go test ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  smoke:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --build --wait

      - name: Smoke test /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health; then
              exit 0
            fi
            sleep 2
          done
          echo "::error::health check failed"
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          missing=0
          for name in DEPLOY_SSH_KEY DEPLOY_USER DEPLOY_HOST DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "::error::Secret $name is not configured"
              missing=1
            fi
          done
          exit $missing

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
          log-public-key: false

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            --exclude .env \
            --exclude bin \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH} && docker-compose up -d --build"
