<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · kde-auth</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 4rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; margin-top: 1rem; font-size: 0.9rem; }
    input { width: 100%; padding: 0.6rem; margin-top: 0.25rem; box-sizing: border-box; }
    button { margin-top: 1.5rem; width: 100%; padding: 0.7rem; background: #111; color: #fff; border: none; cursor: pointer; }
    .msg { padding: 0.75rem; margin-bottom: 1rem; border-radius: 4px; }
    .error { background: #fde8e8; color: #9b1c1c; }
    .success { background: #e6f4ea; color: #1e6b3a; }
    .footer { margin-top: 2rem; font-size: 0.85rem; }
    a { color: #111; }
  </style>
  {{if .TurnstileSiteKey}}<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>{{end}}
</head>
<body>
  {{if .Error}}<div class="msg error">{{.Error}}</div>{{end}}
  {{if .Success}}<div class="msg success">{{.Success}}</div>{{end}}
  <h1>Sign in</h1>
  <form method="post" action="/login">
    <input type="hidden" name="next" value="{{.Next}}">
    <label>Email<input type="email" name="email" value="{{.Email}}" required autocomplete="email"></label>
    <label>Password<input type="password" name="password" required autocomplete="current-password"></label>
    {{if .TurnstileSiteKey}}<div class="cf-turnstile" data-sitekey="{{.TurnstileSiteKey}}" style="margin-top:1rem"></div>{{end}}
    <button type="submit">Sign in</button>
  </form>
  <p class="footer">No account? <a href="/register">Register</a></p>
</body>
</html>
