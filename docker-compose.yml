services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kde_auth
      POSTGRES_PASSWORD: kde_auth
      POSTGRES_DB: kde_auth
    ports:
      - "5433:5432"
    volumes:
      - kde_auth_pg:/var/lib/postgresql/data

  auth:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - db

volumes:
  kde_auth_pg:
